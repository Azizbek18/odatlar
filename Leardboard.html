<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6133e8" />
  <title>Streak.uz - Reyting</title>
  <!-- Duolingo signature font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="Leardboard.css?v=20260706-podiumcompact1" />
</head>
<body>
  <div class="mobile-header">
    <button class="menu-toggle" id="menuToggle" aria-label="Menyuni ochish">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="mobile-logo">Streak.uz</div>
    <div class="mobile-user-avatar">
      <img src="https://i.pravatar.cc/36?img=11" alt="user" class="user-avatar" />
    </div>
  </div>

  <aside class="sidebar">
    <button class="sidebar-close" aria-label="Yopish">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <div>
      <div class="logo">
        <i class="fa-solid fa-bolt"></i> Streak.uz
      </div>

      <div class="user-welcome">
        <img src="rasmlar/Foydalanuvchi rasmi (1).png" alt="Avatar" class="user-avatar" />
        <div>
          <h4 id="welcome-greeting" class="user-name" data-name="Foydalanuvchi">Salom, Foydalanuvchi!</h4>
          <p><i class="fa-solid fa-fire"></i> <span id="sidebar-streak-text" class="user-streak" data-days="0">0 kunlik streak</span></p>
        </div>
      </div>

      <ul class="menu-list">
        <li class="menu-item nav-dashboard"><a href="./dashboard.html"><i class="fa-solid fa-table-cells-large"></i> <span data-i18n="nav_dashboard">Boshqaruv</span></a></li>
        <li class="menu-item nav-rating"><a href="./Leardboard.html"><i class="fa-solid fa-ranking-star"></i> <span data-i18n="nav_rating">Reyting</span></a></li>
        <li class="menu-item nav-profile"><a href="./profil.html"><i class="fa-solid fa-user"></i> <span data-i18n="nav_profile">Profil</span></a></li>
        <li class="menu-item nav-settings"><a href="./sozlamalar.html"><i class="fa-solid fa-gear"></i> <span data-i18n="nav_settings">Sozlamalar</span></a></li>
      </ul>
    </div>

    <button class="btn-add-habit" id="newHabitBtn">
      <i class="fa-solid fa-plus"></i> <span data-i18n="btn_add_habit">Yangi odat</span>
    </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Yangi odat qo'shish modali -->
  <div class="modal-overlay" id="habitModalOverlay">
    <div class="modal" id="habitModal">
      <div class="modal-header">
        <h2 class="modal-title">Yangi odat qo'shish</h2>
        <button class="modal-close" id="modalCloseBtn" aria-label="Yopish">&times;</button>
      </div>
      <form id="habitForm" class="modal-form">
        <div class="form-group">
          <label for="habitName" class="form-label">Odat nomi</label>
          <input type="text" id="habitName" class="form-input" placeholder="Masalan: Har kuni ingliz tili o'rganish" required />
        </div>
        <div class="form-group">
          <label class="form-label">Kategoriya tanlang</label>
          <div class="category-select" id="categorySelect">
            <button type="button" class="cat-option" data-cat="Ingliz tili 🇺🇸">
              <span class="cat-emoji">🇺🇸</span>
              <span>Ingliz tili</span>
            </button>
            <button type="button" class="cat-option" data-cat="Coding 💻">
              <span class="cat-emoji">💻</span>
              <span>Coding</span>
            </button>
            <button type="button" class="cat-option" data-cat="Sport 🏃">
              <span class="cat-emoji">🏃</span>
              <span>Sport</span>
            </button>
            <button type="button" class="cat-option" data-cat="Kitob 📚">
              <span class="cat-emoji">📚</span>
              <span>Kitob</span>
            </button>
          </div>
        </div>
        <div class="form-error" id="formError" style="display:none;"></div>
        <div class="form-group">
          <label for="habitDesc" class="form-label">Tavsif <span class="form-optional">(ixtiyoriy)</span></label>
          <textarea id="habitDesc" class="form-textarea" placeholder="Bu odat haqida qisqacha yozing..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="habitGoal" class="form-label">Kunlik maqsad (daqiqa)</label>
          <div class="goal-input-wrap">
            <button type="button" class="goal-btn goal-minus" id="goalMinus">−</button>
            <input type="number" id="habitGoal" class="form-input goal-input" value="30" min="5" max="480" step="5" />
            <button type="button" class="goal-btn goal-plus" id="goalPlus">+</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="modalCancelBtn">Bekor qilish</button>
          <button type="submit" class="btn-submit" id="modalSubmitBtn">
            <span class="btn-submit-text">Qo'shish</span>
            <span class="btn-submit-loader" id="submitLoader" style="display:none;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="31.4">
                  <animate attributeName="stroke-dashoffset" values="31.4;0" dur="0.8s" repeatCount="indefinite"/>
                </circle>
              </svg>
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <main class="main">
    <div class="banner">
      <div>
        <div class="banner-title">Reyting</div>
        <div class="banner-sub">Eng faol foydalanuvchilar bilan bellashing va o'z o'rningizni toping.</div>
      </div>
      <div class="banner-tabs">
        <button class="btab" data-range="haftalik">Haftalik</button>
        <button class="btab active" data-range="oylik">Oylik</button>
        <button class="btab" data-range="umumiy">Umumiy</button>
      </div>
    </div>

    <div class="cat-tabs">
      <button class="ctab active" data-category="Hammasi">Hammasi</button>
      <button class="ctab" data-category="Ingliz tili">Ingliz tili</button>
      <button class="ctab" data-category="Coding">Coding</button>
      <button class="ctab" data-category="Sport">Sport</button>
      <button class="ctab" data-category="Kitob">Kitob</button>
    </div>

    <div class="podium" id="podium-container"></div>
    <div class="list" id="list-container"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="sidebar-sync.js?v=20260706-toastfix1"></script>
  <script src="Leardboard.js?v=20260706-podiumcompact1"></script>
</body>
</html>
