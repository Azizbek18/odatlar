<!DOCTYPE html>
<html lang="uz">

<head>
    <script src="theme-detector.js"></script>
    <link rel="stylesheet" href="theme.css?v=2.0">
    <script src="auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birgalikda Ultra Enterprise Platform</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="shortcut icon" href="images/Lunch Match Icon.avif" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="xarita.css?v=1.9">
    <link rel="stylesheet" href="responsive.css?v=1.9">
    <link rel="stylesheet" href="mobile-300.css?v=1.0">
</head>

<body class="enterprise-app-mode">

    <div id="toastContainer" class="toast-master-container"></div>

    <div class="app-container">

        <header class="main-header">
            <div class="header-left">
                    <div style="display:flex; align-items:center; gap:8px; font-family:'Poppins', sans-serif;">
                        <span style="font-size:22px;">🍽️</span>
                        <span style="font-size:18px; font-weight:800; background:linear-gradient(135deg, #0077b6, #005A87); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.4px;">Birgalikda</span>
                    </div>


                <div class="search-container">
                    <div class="search-icon-box">
                        <i class="fa-solid fa-magnifying-glass search-main-icon"></i>
                    </div>
                    <input type="text" id="mainSearch" placeholder="Ism, soha, qiziqish yoki manzilni qidiring..."
                        autocomplete="off">
                    <button class="search-clear-btn hidden" id="searchClearBtn">&times;</button>
                    <div class="search-shortcut">⌘K</div>

                    <div class="search-suggestions-dropdown hidden" id="searchSuggestions">
                        <div class="suggestion-section">
                            <h5>Tavsiya etilgan kalit so'zlar</h5>
                            <div class="tag-suggestions-flex">
                                <span class="suggest-tag" data-keyword="UI/UX">UI/UX</span>
                                <span class="suggest-tag" data-keyword="Python">Python</span>
                                <span class="suggest-tag" data-keyword="Kofe">Kofe</span>
                                <span class="suggest-tag" data-keyword="Startap">Startap</span>
                                <span class="suggest-tag" data-keyword="Backend">Backend</span>
                                <span class="suggest-tag" data-keyword="AI">AI</span>
                            </div>
                        </div>
                        <div class="suggestion-section mt-4">
                            <h5>Oxirgi qidiruvlar</h5>
                            <div id="recentSearchesList" class="recent-searches-list">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="relative-dropdown-wrapper">
                    <button class="btn-action btn-primary ripple" id="btnQiziqishlar">
                        <i class="fa-solid fa-shapes"></i>
                        <span>Qiziqishlar</span>
                    </button>
                    <div class="app-dropdown-panel hidden" id="interestsDropdownPanel" style="padding: 12px; min-width: 260px; border-radius: 16px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);">
                        <div class="dropdown-header" style="margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px;">
                            <h5 style="margin: 0; font-size: 13.5px; font-weight: 700; color: #1e293b;">Filtr: Qiziqishlar</h5>
                        </div>
                        <div class="dropdown-body-scroll custom-scrollbar" id="interestsFilterList" style="max-height: 200px; overflow-y: auto; padding: 4px 0;">
                        </div>
                        <div class="dropdown-footer" style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; border-top: 1px solid #f1f5f9; padding-top: 10px;">
                            <button id="clearInterestsBtn" style="background: none; border: none; color: #ef4444; font-size: 12px; font-weight: 700; cursor: pointer; padding: 6px 10px;">Tozalash</button>
                            <button id="applyInterestsBtn" style="background: var(--primary-color); border: none; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; padding: 6px 14px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 90, 135, 0.2);">Saralash</button>
                        </div>
                    </div>
                </div>

                <div class="relative-dropdown-wrapper">
                    <button class="btn-action btn-secondary ripple" id="btnVaqt">
                        <i class="fa-regular fa-clock"></i>
                        <span>Vaqt</span>
                    </button>
                    <div class="app-dropdown-panel hidden" id="timeDropdownPanel" style="padding: 12px; min-width: 240px; border-radius: 16px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);">
                        <div class="dropdown-header" style="margin-bottom: 12px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px;">
                            <h5 style="margin: 0; font-size: 13.5px; font-weight: 700; color: #1e293b;">Filtr: Tushlik vaqti</h5>
                        </div>
                        <div class="dropdown-body" style="padding: 4px 0;">
                            <div class="time-slot-grid" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;">
                                <button class="time-slot-btn" data-time="12:00">12:00 - 13:00</button>
                                <button class="time-slot-btn" data-time="13:00">13:00 - 14:00</button>
                                <button class="time-slot-btn" data-time="14:00">14:00 - 15:00</button>
                            </div>
                        </div>
                        <div class="dropdown-footer" style="display: flex; justify-content: flex-end; margin-top: 12px; border-top: 1px solid #f1f5f9; padding-top: 10px;">
                            <button id="resetTimeFilter" style="background: none; border: none; color: #ef4444; font-size: 12px; font-weight: 700; cursor: pointer; padding: 6px 10px;">Filtrni tozalash</button>
                        </div>
                    </div>
                </div>

                <div class="divider-vertical"></div>

                <div class="relative-dropdown-wrapper">
                    <button class="btn-icon-only" id="notificationBell" onclick="window.location.href='Bildirishnomalar.html'">
                        <i class="fa-regular fa-bell"></i>
                        <span class="notification-badge pulse-effect" id="notiCountBadge">3</span>
                    </button>
                </div>

                <button class="btn-profile animate-avatar-border" id="userProfileMenu">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80"
                        alt="Mening profilim" class="user-avatar-top" id="headerUserAvatar">
                </button>
            </div>
        </header>

        <main class="main-workspace">

            <div class="vector-map-canvas" id="vectorMapCanvas">
            </div>

            <div class="map-controls-panel">
                <button class="map-ctrl-btn glass-effect" id="geoLocateBtn" title="Mening joylashuvim">
                    <i class="fa-solid fa-location-crosshairs"></i>
                </button>
                <div class="map-zoom-group glass-effect">
                    <button class="map-ctrl-btn" id="zoomInBtn" title="Yaqinlashtirish"><i
                            class="fa-solid fa-plus"></i></button>
                    <button class="map-ctrl-btn" id="zoomOutBtn" title="Uzoqlashtirish"><i
                            class="fa-solid fa-minus"></i></button>
                </div>
            </div>

            <section class="bottom-sheet-card" id="mainCardContainer">
                <div class="drag-handle-container" id="dragHandleArea">
                    <div class="drag-handle"></div>
                </div>

                <div class="sheet-header">
                    <div class="header-title-block">
                        <h2 class="sheet-title">Atrofingizdagilar</h2>
                        <div class="badge-count-container">
                            <span class="pulse-dot"></span>
                            <p class="sheet-subtitle"><span id="activeOffersCount" class="counter-animate">0</span> ta
                                faol taklif topildi</p>
                        </div>
                    </div>
                    <button class="btn-filter-toggle" id="filterToggleBtn" title="Kengaytirilgan filtrlar"><i
                            class="fa-solid fa-sliders"></i></button>
                </div>

                <div class="users-scroll-viewport custom-scrollbar" id="usersListContainer">
                </div>

                <footer class="sheet-footer-area">
                    <button class="view-all-link-btn" id="viewAllOffersBtn">
                        <span>Barcha 23 ta taklifni ko'rish</span>
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </button>
                </footer>
            </section>
        </main>

        <div class="modal-overlay" id="userDetailsModal">
            <div class="modal-window bento-box-shadow">
                <button class="modal-close-btn" id="closeModalBtn">&times;</button>
                <div class="modal-cover-gradient"></div>
                <div class="modal-body-content" id="modalDynamicContent">
                </div>
            </div>
        </div>

        <div class="side-drawer-overlay" id="profileSettingsDrawer">
            <div class="drawer-window">
                <div class="drawer-header">
                    <h3>Profil Sozlamalari</h3>
                    <button class="drawer-close-btn" id="closeDrawerBtn">&times;</button>
                </div>
                <div class="drawer-body custom-scrollbar">
                    <div class="profile-setup-avatar-zone">
                        <div class="avatar-edit-wrapper">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&auto=format&fit=crop&q=80"
                                alt="Avatar" id="drawerAvatarImg">
                            <label for="avatarFileInput" class="avatar-upload-label"><i
                                    class="fa-solid fa-camera"></i></label>
                            <input type="file" id="avatarFileInput" accept="image/*" class="hidden">
                        </div>
                    </div>
                    <form id="profileUpdateForm" class="drawer-form">
                        <div class="form-group">
                            <label>To'liq ismingiz</label>
                            <input type="text" id="profName" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Kompaniya va Lavozim</label>
                            <input type="text" id="profTitle" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>O'zingiz haqingizda qisqacha (Bio)</label>
                            <textarea id="profBio" rows="4" class="form-control"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Sizning qiziqishlaringiz (Vergul bilan ajrating)</label>
                            <input type="text" id="profInterests" class="form-control">
                        </div>
                        <button type="submit" class="btn-save-profile ripple">O'zgarishlarni saqlash</button>
                        <button type="button" class="btn-reset-filter w-full mt-2" id="reconfigure-onboarding-btn" style="border: 1px solid #cbd5e1; color: #64748b;">Onboardingni boshidan boshlash</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="side-drawer-overlay" id="advancedFilterDrawer">
            <div class="drawer-window">
                <div class="drawer-header">
                    <h3>Kengaytirilgan Filtrlar</h3>
                    <button class="drawer-close-btn" id="closeFilterDrawerBtn">&times;</button>
                </div>
                <div class="drawer-body custom-scrollbar">
                    <div class="drawer-form">
                        <div class="form-group">
                            <label>Moslik darajasi (Minimal %)</label>
                            <div class="range-slider-wrapper">
                                <input type="range" id="filterMatchRange" min="50" max="95" value="50"
                                    class="range-slider">
                                <span id="rangeValueDisplay">50%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Masofa (Maksimal)</label>
                            <select id="filterDistanceSelect" class="form-control">
                                <option value="all">Barchasi</option>
                                <option value="500">500m gacha</option>
                                <option value="1500">1.5km gacha</option>
                                <option value="3000">3km gacha</option>
                            </select>
                        </div>
                        <button class="btn-save-profile ripple" id="applyAdvancedFiltersBtn">Filtrlarni
                            qo'llash</button>
                        <button class="btn-reset-filter w-full mt-2" id="clearAllFiltersBtn">Barcha filtrlarni
                            tashlash</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- PASTKI CHAP BURCHAKDAGI ANIMATSIYALI ORQAGA TUGMASI -->
        <a href="javascript:void(0);" class="fixed-back-button ripple-effect" title="Ortga qaytish" id="backBtnLink">
            <div class="back-button-content">
                <i class="fa-solid fa-arrow-left arrow-animation"></i>
                <span>Orqaga</span>
            </div>
            <div class="back-button-glow"></div>
        </a>
    </div>

    <script src="xarita.js"></script>
    <script src="sidebar.js?v=1.4"></script>
</body>

</html>
