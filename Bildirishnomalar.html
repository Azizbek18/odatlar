<!DOCTYPE html>
<html lang="uz">

<head>
    <script src="theme-detector.js"></script>
    <link rel="stylesheet" href="theme.css?v=2.0">
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birgalikda - Bildirishnomalar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Bildirishnomalar.css">
    <link rel="shortcut icon" href="images/24-hour-support.png" type="image/x-icon">
    <link rel="stylesheet" href="responsive.css?v=2.0">
    <link rel="stylesheet" href="mobile-300.css?v=1.0">
</head>

<body>

    <main class="notifications-container">
        <header class="notif-header">
            <div class="header-left">
                <button type="button" class="back-btn" id="btn-back">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h1>Bildirishnomalar</h1>
            </div>
            <button type="button" class="clear-all-btn" id="btn-clear-all">Barchasini o'chirish</button>
        </header>

        <div class="filter-tabs" id="tabs-container">
            <button class="tab-btn active" data-filter="all">Barchasi</button>
            <button class="tab-btn" data-filter="unread">O'qilmaganlar</button>
            <button class="tab-btn" data-filter="matches">Matchlar</button>
            <button class="tab-btn" data-filter="streak">Streak</button>
            <button class="tab-btn" data-filter="system">Tizim</button>
        </div>

        <div class="notifications-list" id="notifications-list">
            <!-- Dinamik ravishda JavaScript orqali yuklanadi -->
        </div>

        <div id="empty-state" class="empty-state hidden">
            <i class="fa-regular fa-bell-slash"></i>
            <p>Hech qanday bildirishnoma mavjud emas</p>
        </div>
    </main>

    <script src="Bildirishnomalar.js"></script>
</body>

</html>
